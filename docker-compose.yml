version: '3.8'

x-airflow-common: &airflow-common
  #image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.7.1}
  build: .
  environment: &airflow-common-env
    DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    AIRFLOW_CONN_SPARK_SSH: ssh://root:sparkroot@spark-master:22
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:postgres123@postgres:5432/postgres
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - postgres_data:/var/lib/postgresql/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # 1. DATABASE
  postgres:
    image: postgres:13
    container_name: postgres_jobs
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres # DB mặc định cho Airflow
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      retries: 5
    networks:
      - data-network

  # 2. DATA LAKE
  minio:
    image: minio/minio
    container_name: minio_jobs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - data-network
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: minio_init_jobs
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing myminio/data-lake;
      mc mb --ignore-existing myminio/warehouse;
      exit 0;
      "
    networks:
      - data-network

  # 3. Hive-metastore metadata
  hive-db-isolated:
    image: postgres:13
    container_name: hive_db_isolated
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - hive_isolated_data:/var/lib/postgresql/data
    networks:
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d metastore_db"]
      interval: 10s
      retries: 5

  # RECOMMENDED: Updated Hive Metastore with version 4.0.0 (has S3A support built-in)

  hive-metastore:
    build:
      context: ./hive-metastore
      dockerfile: Dockerfile.hive
    container_name: hive_metastore_jobs
    restart: unless-stopped
    depends_on:
      hive-db-isolated:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      # AWS/S3 environment variables for MinIO
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    ports:
      - "9083:9083"
    networks:
      - data-network
    volumes:
      # Mount runtime config
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
  #chrome
  chrome:
    image: selenium/standalone-chromium:latest
    container_name: chrome_headless
    ports:
      - "4444:4444"
      - "9222:9222"
    shm_size: "2gb"
    networks:
      - data-network
# Remove the old 3.1.0 and 1.11.271 lines
  # Compute layer trino
  trino:
    image: trinodb/trino:latest
    container_name: trino-coordinator
    ports:
      - "8082:8080"
    environment:
      - TRINO_NODE_ID=trino-coordinator
    volumes:
      - ./jobs/trino/catalog/demo.properties:/etc/trino/catalog/demo.properties
    networks:
      - data-network
    depends_on:
      - minio
      - hive-metastore

  # 4. PROCESSING
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    #image: public.ecr.aws/bitnami/spark:3.5
    container_name: spark_master_jobs
    dns:
      - 8.8.8.8      
      - 8.8.4.4
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
      - "7077:7077"
      - "2222:22"
    networks:
      - data-network
    volumes:
      - ./jobs:/jobs
      - ./jobs/crawlers/json_cookies/itviec_cookies.json:/jobs/crawlers/json_cookies/itviec_cookies.json
      - ./jobs/crawlers/json_cookies/topcv_cookies.json:/jobs/crawlers/json_cookies/topcv_cookies.json
    depends_on:
      - minio-init

  spark-worker-1:
    build:
      context: .
      dockerfile:  Dockerfile.spark
    #image: public.ecr.aws/bitnami/spark:3.5
    container_name: spark_worker_1_jobs
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        limits:
          memory: 1.5G
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    depends_on:
      - spark-master
    networks:
      - data-network
    volumes:
      - ./scripts:/opt/bitnami/spark/scripts

  # 5. Discord bot
  discord-bot:
    build:
      context: ./jobs/notifications
    container_name: discord_bot_jobs
    env_file:
      - .env
    networks:
      - data-network
    depends_on:
      - trino
  # 6. ORCHESTRATION
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - data-network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    networks:
      - data-network

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    networks:
      - data-network

  # 6. VISUALIZATION
  metabase:
    image: metabase/metabase
    container_name: metabase_jobs
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: warehouse_db
      MB_DB_PORT: 5432
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: ${MB_DB_HOST}
    networks:
      - data-network
    depends_on:
      - postgres

networks:
  data-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  hive_isolated_data:
